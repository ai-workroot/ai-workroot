name: Feature request
description: Propose a capability, tool, adapter, validation rule, or workflow improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Explain the real user, team, or role workflow behind the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Workroot boundaries
      options:
        - label: This keeps files as the durable source of truth.
        - label: This does not require a specific model, provider, agent, or operating system.
        - label: This does not add domain-specific assumptions to the core template.
        - label: This follows docs/extension-contract.md if it is an extension.
